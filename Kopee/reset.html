<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ── Security Headers via Meta ── -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>

  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()"/>
  <!-- ✅ CSP via meta — tanpa frame-ancestors -->
<meta http-equiv="Content-Security-Policy"
content="default-src 'self';
         script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com;
         style-src  'self' https://fonts.googleapis.com 'unsafe-inline';
         font-src   https://fonts.gstatic.com;
         connect-src https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com;
         img-src    'self' data: https:;"/>

  <title>Koope - Reset Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="CSS/reset.css"/>
  <link rel="icon" type="image/x-icon" href="assets/Favicons.png">
</head>
<body>

  <!-- ── Ambient Background Orbs ── -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- ── Floating deco ── -->
  <div class="deco deco-1">✦</div>
  <div class="deco deco-2">✦</div>
  <div class="deco deco-3">✦</div>

  <!-- ══════════════════════════════════════
       MAIN CARD
  ══════════════════════════════════════ -->
  <main class="page-center">
    <div class="glass-card" id="resetCard">

      <!-- Logo -->
      <a href="index.html" class="card-logo" aria-label="Kembali ke beranda">
        <span class="logo-icon">☕</span>
        <span class="logo-text">Kopee</span>
      </a>

      <!-- Heading -->
      <div class="card-header">
        <h1 class="card-title">Reset<br/><em>Password</em></h1>
        <p class="card-subtitle">
          Masukkan email yang terdaftar. Kami akan mengirimkan<br/>
          tautan untuk membuat password baru.
        </p>
      </div>

      <!-- ── Toast Notification ── -->
      <div class="toast hidden" id="toast" role="alert" aria-live="polite">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-msg"  id="toastMsg"></span>
      </div>

      <!-- ── Form ── -->
      <form class="reset-form" id="resetForm" novalidate autocomplete="off">

        <!-- Email Field -->
        <div class="field-group" id="fieldGroup">
          <label for="emailInput" class="field-label">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input
              type="email"
              id="emailInput"
              name="email"
              class="field-input"
              placeholder="nama@email.com"
              required
              autocomplete="email"
              spellcheck="false"
              maxlength="254"
            />
            <span class="input-valid-icon" id="validIcon"></span>
          </div>
          <p class="field-error hidden" id="fieldError"></p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-send"
          id="sendBtn"
          disabled
          aria-disabled="true"
        >
          <span class="btn-label" id="btnLabel">Send Reset Link</span>
          <span class="btn-spinner hidden" id="btnSpinner" aria-hidden="true"></span>
          <span class="btn-arrow" id="btnArrow">→</span>
        </button>

      </form>

      <!-- Back to Login -->
      <div class="card-footer">
        <a href="login.html" class="back-link">
          <span class="back-arrow">←</span>
          Back to Login
        </a>
      </div>

    </div>

    <div class="logo">
      <img src="assets/FullLogo.png" alt="FullLogo">
    </div>
  </main>

  <!-- ── Firebase Compat ── -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="JS/reset.js"></script>

</body>
</html>
