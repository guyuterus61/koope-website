<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koope - Login | Restaurant Koope Kediri</title>
  <meta name="description" content="Masuk ke akun VIP Koope dan nikmati akses eksklusif Secret Menu & diskon istimewa."/>
  <meta property="og:title"       content="Login — Restaurant Koope"/>
  <meta property="og:description" content="Masuk ke akun VIP Koope dan nikmati akses eksklusif Secret Menu & diskon istimewa."/>
  <meta property="og:image"       content="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=1200&q=80"/>
  <meta name="theme-color"        content="#2d1b0e"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="CSS/auth.css">
  <link rel="stylesheet" href="CSS/kopee-toast.css">
  <link rel="icon" type="image/x-icon" href="assets/Favicons.png">
</head>
<body>
  <div class="page-split">

    <!-- LEFT: Branding -->
    <div class="split-left">
      <div class="split-left-inner">
        <a href="index.html" class="brand-logo page-link">
          <span class="brand-icon">☕</span>
          <span class="brand-name">Koope</span>
        </a>
        <div class="brand-copy">
          <h2 class="brand-headline">A Cup of<br/><em>Extraordinary</em></h2>
          <p class="brand-sub">Bergabung sebagai VIP member dan nikmati pengalaman kopi eksklusif yang tak tertandingi.</p>
        </div>
        <div class="split-img-wrap">
          <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=800&auto=format&fit=crop" alt="Coffee" class="split-img"/>
        </div>
        <div class="split-deco deco-1">✦</div>
        <div class="split-deco deco-2">✦</div>
      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="split-right">
      <div class="form-panel">

        <a href="index.html" class="brand-logo brand-logo--mobile page-link">
          <span class="brand-icon">☕</span>
          <span class="brand-name">Koope</span>
        </a>

        <div class="form-header">
          <h1 class="form-title">Welcome Back</h1>
          <p class="form-subtitle">Masuk ke akun VIP kamu</p>
        </div>

        <form id="login-form" novalidate>

          <div class="field-group" id="fg-email">
            <label class="field-label" for="email-log">Email Address</label>
            <div class="field-input-wrap">
              <i class="fas fa-envelope field-icon"></i>
              <input type="email" id="email-log" name="email-log" class="field-input"
                placeholder="nama@email.com" autocomplete="email" required/>
              <span class="field-valid-icon" id="emailValid"></span>
            </div>
            <p class="field-error hidden" id="emailError"></p>
          </div>

          <div class="field-group" id="fg-pass">
            <label class="field-label" for="pass-log">Password</label>
            <div class="field-input-wrap">
              <i class="fas fa-lock field-icon"></i>
              <input type="password" id="pass-log" name="pass-log" class="field-input"
                placeholder="••••••••" autocomplete="current-password" required/>
              <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password visibility">
                <i class="fas fa-eye" id="passToggleIcon"></i>
              </button>
            </div>
            <p class="field-error hidden" id="passError"></p>
          </div>

          <div class="form-meta">
            <a href="reset.html" class="link-muted page-link">Lupa password?</a>
          </div>

          <button type="submit" class="btn-submit" id="log-btn">
            <span id="btnLabel">Sign In</span>
            <span class="btn-spinner hidden" id="btnSpinner"></span>
            <i class="fas fa-arrow-right btn-arrow" id="btnArrow"></i>
          </button>

          <p class="form-switch">
            Belum punya akun? <a href="register.html" class="link-gold page-link">Daftar sekarang</a>
          </p>

        </form>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD9ntDSRtMV8XdcSem7I2onoB1LIIuaQjk",
      authDomain: "kopee-web.firebaseapp.com",
      projectId: "kopee-web",
      storageBucket: "kopee-web.firebasestorage.app",
      messagingSenderId: "691671488388",
      appId: "1:691671488388:web:d05dca2671c576ff2aafd1"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const rtdb = firebase.database();
  </script>
  <script src="JS/kopee-toast.js"></script>
  <script src="JS/login.js"></script>
</body>
</html>
