        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <body>
       
        <main class="hero">
            <div class="container-reg">
                <div class="text-reg">
                    <h1>Welcome</h1>
                    <p>Please enter your details to create an account.</p>
                </div>
    
                <form action="" method="post" id="reg-form">
                    <div class="all-input-reg">
                        <div class="email-reg">
                            <label for="emai-reg">Email address:</label>
                            <input type="email" name="email-reg" id="email-reg" placeholder="Your@gmail.com" required>
                        </div>
    
                        <div class="pass-reg">
                            <label for="pass-reg">Password:</label>
                            <input type="password" name="pass-reg" id="pass-reg" placeholder="●●●●●●●●" required>
                        </div>
 
                        <div class="pass-reg-confirm">
                            <label for="pass-reg-confirm">Confirm Password:</label>
                            <input type="password" name="pass-reg-confirm" id="pass-reg-confirm" placeholder="●●●●●●●●" required>
                        </div>
    
                        <div class="go-log">
                            <h3>Already have an account? <a href="login.html">Sign In</a></h3>
                        </div>
    
                        <div class="btn-reg">
                            <button type="submit" id="reg-btn">Sign Up</button>
                        </div>
                    </div>
                </form>
                <div class="logo">
                    <img src="assets/FullLogo.png" alt="FullLogo">
                </div>
            </div>
        </main>
